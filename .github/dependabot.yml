version: 2

updates:
  # Python dependencies declared in pyproject.toml
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      include: "scope"
    # Group routine, non-security updates so dependabot doesn't fragment
    # review into a dozen tiny PRs. Security updates still come through
    # individually and jump the queue.
    groups:
      routine:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions pinned in .github/workflows/
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
