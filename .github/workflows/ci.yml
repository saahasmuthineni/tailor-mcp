name: CI

# Run on every push to main and on pull requests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older in-flight runs for the same ref — saves 9 runners when
# someone pushes twice in a row.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install lint deps
        run: |
          python -m pip install --upgrade pip
          pip install "ruff>=0.15.10" "mypy>=1.10"

      - name: Ruff check
        run: ruff check src tests

      # Formatting is configured but not yet enforced in CI — running
      # `ruff format` locally will reformat the full tree. Enable this
      # step once the initial format pass has been committed.
      # - name: Ruff format (check only)
      #   run: ruff format --check src tests

      # mypy runs informationally for now — see pyproject.toml [tool.mypy].
      # Flip `continue-on-error` off once the remaining errors are
      # addressed (tracked on the roadmap).
      - name: mypy (informational)
        continue-on-error: true
        run: mypy src/tailor

  test:
    name: Test (${{ matrix.os }} · py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false  # Don't cancel other jobs if one fails

    steps:
      # 1. Check out the repo
      - name: Checkout code
        uses: actions/checkout@v6

      # 2. Set up Python (with pip cache keyed on pyproject.toml)
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      # 3. Install the project + dev dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # 4. Run the test suite with coverage. Floor sits ~2pp below current
      #    baseline (82%) — intentionally undertested paths (CLI, OAuth
      #    wizard, demo, strava_api) are excluded via [tool.coverage.run]
      #    in pyproject.toml so this number reflects the framework code
      #    we expect to keep tested.
      - name: Run tests
        run: pytest -v --cov=tailor --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      # 5. Run standalone security probe
      - name: Security probe
        run: python tests/security_probe.py

      # 6. Verify the CLI entry point works
      - name: Smoke test CLI
        run: tailor --help

      # 7. Upload coverage as a build artifact (one per matrix cell)
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore
