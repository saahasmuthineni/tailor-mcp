name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ruff + pytest (${{ matrix.os-name }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
        include:
          - os: ubuntu-latest
            os-name: Ubuntu
          - os: windows-latest
            os-name: Windows
          - os: macos-latest
            os-name: macOS

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        # Scope matches CONTRIBUTING.md: production code + tests, not
        # benchmarks/docs/examples (notebook pedagogy + setup scripts
        # carry intentional style that does not gate releases).
        run: ruff check src tests

      - name: Tests (pytest)
        run: pytest -v -x --timeout=60
