name: CI

# Run on every push to main and on pull requests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false  # Don't cancel other jobs if one fails

    steps:
      # 1. Check out the repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # 3. Install the project + dev dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # 4. Run the test suite with coverage
      - name: Run tests
        run: pytest -v --cov=biosensor_mcp --cov-report=term-missing

      # 5. Run standalone security probe
      - name: Security probe
        run: python tests/security_probe.py

      # 6. Verify the CLI entry point works
      - name: Smoke test CLI
        run: biosensor-mcp --help
