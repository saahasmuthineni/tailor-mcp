name: DCO

on:
  pull_request:

jobs:
  dco:
    name: DCO sign-off check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify Signed-off-by on every PR commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          missing=0
          for sha in $(git rev-list "$BASE_SHA".."$HEAD_SHA" --no-merges); do
            if ! git log -1 --format=%B "$sha" | grep -qiE '^Signed-off-by: .+<.+>'; then
              echo "::error::Commit $sha is missing a Signed-off-by line. Amend with 'git commit --amend -s' (or use 'git commit -s' going forward). See CONTRIBUTING.md § Developer Certificate of Origin."
              missing=1
            fi
          done
          if [ "$missing" -eq 0 ]; then
            echo "All commits carry a Signed-off-by line."
          fi
          exit $missing
