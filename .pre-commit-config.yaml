# Pre-commit hooks. Run locally with:
#
#   pip install pre-commit
#   pre-commit install
#   pre-commit run --all-files
#
# Rules of engagement:
# - Ruff configuration lives in pyproject.toml under [tool.ruff].
#   Do not duplicate it here. If you need to change the lint rules,
#   edit pyproject.toml and pre-commit will pick it up.
# - The ruff rev below should move in lockstep with the `ruff>=0.5`
#   floor declared in pyproject.toml's [project.optional-dependencies].
# - CI runs `ruff check src tests` directly; these hooks are the local
#   fast-feedback loop, not a substitute.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      # Lint. Configuration comes from pyproject.toml [tool.ruff.lint].
      - id: ruff
        args: ["--fix"]
      # Format-check only — do not rewrite on commit. The initial tree-
      # wide format pass has not landed yet; flip to `ruff-format`
      # (without --check) once it does.
      - id: ruff-format
        args: ["--check"]
