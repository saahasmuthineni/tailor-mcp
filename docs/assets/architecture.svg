<svg xmlns="http://www.w3.org/2000/svg" width="720" height="330" viewBox="0 0 720 330">

  <!-- Background -->
  <rect fill="#f8f9fa" x="0" y="0" width="720" height="330" rx="8" ry="8"/>

  <!-- Title -->
  <text fill="#1a1a1a" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="14" font-weight="600" x="360" y="28" text-anchor="middle">Architecture</text>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" x="360" y="46" text-anchor="middle">Every request passes through RouterMCP's security pipeline. The LLM cannot bypass any gate.</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- MCP CLIENT BOX -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect fill="#f3f0ff" stroke="#c4b5fd" stroke-width="1.5" x="16" y="68" width="138" height="90" rx="10" ry="10"/>
  <text fill="#7c3aed" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" font-weight="700" x="85" y="88" text-anchor="middle" letter-spacing="0.5">MCP CLIENT</text>
  <line stroke="#e9d5ff" stroke-width="1" x1="28" y1="96" x2="142" y2="96"/>
  <text fill="#4b5563" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="85" y="113" text-anchor="middle">Claude Desktop</text>
  <text fill="#9ca3af" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="9" x="85" y="129" text-anchor="middle">Cline · API</text>
  <text fill="#9ca3af" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="9" x="85" y="145" text-anchor="middle">any MCP client</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- CLIENT <--> ROUTER DOUBLE ARROW -->
  <!-- ═══════════════════════════════════════════════════ -->
  <line stroke="#c4b5fd" stroke-width="1.5" x1="156" y1="113" x2="188" y2="113"/>
  <!-- arrowhead right -->
  <polygon fill="#c4b5fd" points="188,109 196,113 188,117"/>
  <!-- arrowhead left -->
  <polygon fill="#c4b5fd" points="156,109 148,113 156,117"/>
  <!-- label badge -->
  <rect fill="#f3f0ff" stroke="#c4b5fd" stroke-width="1" x="156" y="102" width="42" height="14" rx="7" ry="7"/>
  <text fill="#7c3aed" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="8" x="177" y="112" text-anchor="middle">MCP</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- ROUTER MCP BOX — central, prominent -->
  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Shadow effect (offset duplicate) -->
  <rect fill="#dbeafe" x="203" y="58" width="296" height="128" rx="10" ry="10"/>
  <!-- Main box -->
  <rect fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" x="198" y="54" width="296" height="128" rx="10" ry="10"/>
  <!-- Left accent bar -->
  <rect fill="#3b82f6" x="198" y="54" width="6" height="128" rx="3" ry="3"/>

  <text fill="#1d4ed8" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" font-weight="700" x="360" y="76" text-anchor="middle" letter-spacing="0.5">ROUTER MCP</text>
  <line stroke="#bfdbfe" stroke-width="1" x1="210" y1="84" x2="488" y2="84"/>

  <!-- Pipeline step chips — row 1 -->
  <rect fill="#dbeafe" x="216" y="92" width="50" height="16" rx="8" ry="8"/>
  <text fill="#1e40af" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="8" x="241" y="103" text-anchor="middle">validate</text>

  <text fill="#93c5fd" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="272" y="103">→</text>

  <rect fill="#dbeafe" x="282" y="92" width="66" height="16" rx="8" ry="8"/>
  <text fill="#1e40af" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="8" x="315" y="103" text-anchor="middle">circuit-break</text>

  <text fill="#93c5fd" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="354" y="103">→</text>

  <rect fill="#dbeafe" x="364" y="92" width="50" height="16" rx="8" ry="8"/>
  <text fill="#1e40af" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="8" x="389" y="103" text-anchor="middle">consent</text>

  <text fill="#93c5fd" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="420" y="103">→</text>

  <rect fill="#dbeafe" x="430" y="92" width="36" height="16" rx="8" ry="8"/>
  <text fill="#1e40af" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="8" x="448" y="103" text-anchor="middle">cost</text>

  <!-- Pipeline step chips — row 2 -->
  <rect fill="#bfdbfe" x="216" y="116" width="50" height="16" rx="8" ry="8"/>
  <text fill="#1e3a8a" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="8" x="241" y="127" text-anchor="middle">execute</text>

  <text fill="#93c5fd" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="272" y="127">→</text>

  <rect fill="#bfdbfe" x="282" y="116" width="40" height="16" rx="8" ry="8"/>
  <text fill="#1e3a8a" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="8" x="302" y="127" text-anchor="middle">scrub</text>

  <text fill="#93c5fd" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="328" y="127">→</text>

  <rect fill="#bfdbfe" x="338" y="116" width="36" height="16" rx="8" ry="8"/>
  <text fill="#1e3a8a" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="8" x="356" y="127" text-anchor="middle">audit</text>

  <text fill="#93c5fd" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="380" y="127">→</text>

  <rect fill="#bfdbfe" x="390" y="116" width="92" height="16" rx="8" ry="8"/>
  <text fill="#1e3a8a" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="8" x="436" y="127" text-anchor="middle">provenance stamp</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- FORK CONNECTOR: Router right → two boxes -->
  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Horizontal stub from router right edge -->
  <line stroke="#d1d5db" stroke-width="1.5" x1="494" y1="90" x2="518" y2="90"/>
  <line stroke="#d1d5db" stroke-width="1.5" x1="494" y1="140" x2="518" y2="140"/>
  <!-- Vertical fork bar -->
  <line stroke="#d1d5db" stroke-width="1.5" x1="518" y1="90" x2="518" y2="140"/>
  <!-- Horizontal branches to boxes -->
  <line stroke="#d1d5db" stroke-width="1.5" x1="518" y1="90" x2="543" y2="90"/>
  <polygon fill="#d1d5db" points="543,86 551,90 543,94"/>
  <line stroke="#d1d5db" stroke-width="1.5" x1="518" y1="140" x2="543" y2="140"/>
  <polygon fill="#d1d5db" points="543,136 551,140 543,144"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- CHILD MCP BOX -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5" x="554" y="62" width="150" height="58" rx="10" ry="10"/>
  <text fill="#374151" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" font-weight="700" x="629" y="82" text-anchor="middle" letter-spacing="0.5">CHILD MCP</text>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="629" y="99" text-anchor="middle">one per data source</text>
  <text fill="#9ca3af" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="9" x="629" y="112" text-anchor="middle">CSV · MATLAB · REDCap · ···</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- VAULT LAYER BOX -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" x="554" y="132" width="150" height="58" rx="10" ry="10"/>
  <text fill="#166534" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" font-weight="700" x="629" y="152" text-anchor="middle" letter-spacing="0.5">VAULT LAYER</text>
  <text fill="#4b5563" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="629" y="169" text-anchor="middle">cross-session memory</text>
  <text fill="#9ca3af" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="9" x="629" y="182" text-anchor="middle">Obsidian-compatible markdown</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- BOTTOM DESCRIPTION BAR -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect fill="#ffffff" stroke="#e5e7eb" stroke-width="1" x="16" y="210" width="688" height="104" rx="8" ry="8"/>

  <text fill="#374151" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" font-weight="600" x="32" y="232">RouterMCP</text>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="32" y="248">Owns the dispatch pipeline. Behavioral rules live server-side — any MCP client</text>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="32" y="262">gets identical enforcement.</text>

  <line stroke="#f3f4f6" stroke-width="1" x1="248" y1="222" x2="248" y2="306"/>

  <text fill="#374151" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" font-weight="600" x="264" y="232">ChildMCP</text>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="264" y="248">Abstract base class — implement five</text>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="264" y="262">methods to register a new data source.</text>

  <line stroke="#f3f4f6" stroke-width="1" x1="468" y1="222" x2="468" y2="306"/>

  <text fill="#374151" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" font-weight="600" x="484" y="232">VaultLayer</text>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="484" y="248">Framework-level infrastructure, parallel</text>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="484" y="262">to the child registry, not a child itself.</text>

</svg>
