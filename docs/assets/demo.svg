<svg xmlns="http://www.w3.org/2000/svg" width="820" height="580" viewBox="0 0 820 580">
  <!-- Background -->
  <rect fill="#1e1e2e" x="0" y="0" width="820" height="580" rx="8" ry="8"/>
  <!-- Title bar -->
  <rect fill="#313244" x="0" y="0" width="820" height="36" rx="8" ry="8"/>
  <rect fill="#1e1e2e" x="0" y="28" width="820" height="8"/>
  <circle fill="#f38ba8" cx="20" cy="18" r="6"/>
  <circle fill="#f9e2af" cx="40" cy="18" r="6"/>
  <circle fill="#a6e3a1" cx="60" cy="18" r="6"/>
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="12" text-anchor="middle" x="410" y="22">biosensor-mcp demo &#xB7; synthetic 60-min run</text>

  <!-- Command prompt -->
  <text fill="#cdd6f4" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="12" x="16" y="58"><tspan fill="#a6e3a1">$</tspan> biosensor-mcp demo</text>
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="16" y="74">No Strava account needed. Runs server-side analytics on synthetic per-second data.</text>

  <!-- === LEFT COLUMN: Raw Sensor Data === -->
  <rect fill="#302030" stroke="#f38ba8" stroke-width="1.5" x="24" y="94" width="220" height="340" rx="10" ry="10"/>
  <text fill="#f38ba8" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" x="134" y="114" text-anchor="middle">RAW SENSOR DATA</text>
  <line stroke="#45344a" stroke-width="1" x1="40" y1="122" x2="228" y2="122"/>
  <!-- Run stats -->
  <text fill="#cdd6f4" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="11" x="44" y="142">60 min &#xB7; 6.65 miles</text>
  <text fill="#cdd6f4" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="11" x="44" y="160">3,600 pts &#xD7; 8 streams</text>
  <line stroke="#45344a" stroke-width="1" x1="40" y1="172" x2="228" y2="172"/>
  <!-- Stream list -->
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="44" y="190">heartrate[3600]</text>
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="44" y="206">velocity[3600]</text>
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="44" y="222">latlng[3600]</text>
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="44" y="238">altitude[3600]</text>
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="44" y="254">grade[3600]</text>
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="44" y="270">distance[3600]</text>
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="44" y="286">time[3600]</text>
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="44" y="302">moving[3600]</text>
  <line stroke="#45344a" stroke-width="1" x1="40" y1="314" x2="228" y2="314"/>
  <!-- Token count -->
  <text fill="#f38ba8" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="20" font-weight="600" x="134" y="342" text-anchor="middle">~68,000</text>
  <text fill="#f38ba8" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="12" x="134" y="360" text-anchor="middle">tokens if sent raw</text>
  <!-- Token bar -->
  <rect fill="#f38ba8" opacity="0.6" x="40" y="374" width="188" height="14" rx="3" ry="3"/>
  <!-- Cost -->
  <text fill="#f38ba8" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="12" font-weight="600" x="134" y="408" text-anchor="middle">~$0.20 per query</text>

  <!-- === Arrow 1 === -->
  <line stroke="#6c7086" stroke-width="1.5" x1="252" y1="264" x2="288" y2="264"/>
  <polygon fill="#6c7086" points="288,258 300,264 288,270"/>

  <!-- === CENTER COLUMN: Security Pipeline === -->
  <rect fill="#1a2332" stroke="#89b4fa" stroke-width="1.5" x="304" y="94" width="220" height="340" rx="10" ry="10"/>
  <text fill="#89b4fa" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" x="414" y="114" text-anchor="middle">SERVER-SIDE PIPELINE</text>
  <line stroke="#2a3a4f" stroke-width="1" x1="320" y1="122" x2="508" y2="122"/>
  <!-- Pipeline steps -->
  <rect fill="#232e3e" x="320" y="134" width="188" height="26" rx="6" ry="6"/>
  <text fill="#cdd6f4" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="332" y="151">&#x2460; ParamValidator</text>
  <rect fill="#232e3e" x="320" y="166" width="188" height="26" rx="6" ry="6"/>
  <text fill="#cdd6f4" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="332" y="183">&#x2461; CircuitBreaker</text>
  <rect fill="#232e3e" x="320" y="198" width="188" height="26" rx="6" ry="6"/>
  <text fill="#cdd6f4" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="332" y="215">&#x2462; ConsentGate</text>
  <rect fill="#232e3e" x="320" y="230" width="188" height="26" rx="6" ry="6"/>
  <text fill="#cdd6f4" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="332" y="247">&#x2463; CostGate</text>
  <rect fill="#232e3e" x="320" y="262" width="188" height="26" rx="6" ry="6"/>
  <text fill="#cdd6f4" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="332" y="279">&#x2464; AuditLog + Ledger</text>
  <!-- Divider -->
  <line stroke="#2a3a4f" stroke-width="1" x1="320" y1="300" x2="508" y2="300"/>
  <!-- Analytics -->
  <text fill="#89b4fa" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" font-weight="600" x="414" y="318" text-anchor="middle">COMPUTE LOCALLY</text>
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="332" y="336">zones, splits, drift</text>
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="332" y="352">decoupling, EF, GAP</text>
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="332" y="368">phases, anomalies</text>
  <!-- Local badge -->
  <rect fill="#1e3a2e" stroke="#a6e3a1" stroke-width="1" x="338" y="384" width="152" height="26" rx="13" ry="13"/>
  <text fill="#a6e3a1" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" font-weight="600" x="414" y="401" text-anchor="middle">&#x1F512; On your machine</text>

  <!-- === Arrow 2 === -->
  <line stroke="#6c7086" stroke-width="1.5" x1="532" y1="264" x2="568" y2="264"/>
  <polygon fill="#6c7086" points="568,258 580,264 568,270"/>

  <!-- === RIGHT COLUMN: What Claude Sees === -->
  <rect fill="#1a2e1a" stroke="#a6e3a1" stroke-width="1.5" x="584" y="154" width="212" height="200" rx="10" ry="10"/>
  <text fill="#a6e3a1" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" x="690" y="174" text-anchor="middle">WHAT CLAUDE SEES</text>
  <line stroke="#2e4a2e" stroke-width="1" x1="600" y1="182" x2="780" y2="182"/>
  <!-- Summary items -->
  <text fill="#cdd6f4" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="604" y="200">decoupling:  7.8%</text>
  <text fill="#cdd6f4" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="604" y="216">efficiency:  57.82 EF</text>
  <text fill="#cdd6f4" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="604" y="232">hr_drift:    5.3%</text>
  <text fill="#cdd6f4" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="604" y="248">zones:  Z3/Z4/Z5</text>
  <text fill="#cdd6f4" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="604" y="264">splits: 8:48&#x2192;9:12</text>
  <text fill="#cdd6f4" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="604" y="280">anomalies: 0</text>
  <line stroke="#2e4a2e" stroke-width="1" x1="600" y1="290" x2="780" y2="290"/>
  <!-- Token count -->
  <text fill="#a6e3a1" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="18" font-weight="600" x="690" y="314" text-anchor="middle">~800 tokens</text>
  <!-- Token bar (to scale vs 188px left bar) -->
  <rect fill="#a6e3a1" opacity="0.7" x="688" y="324" width="2" height="10" rx="1" ry="1"/>
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="9" x="694" y="333">&#x2190; to scale</text>
  <!-- Cost -->
  <text fill="#a6e3a1" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="12" font-weight="600" x="690" y="350" text-anchor="middle">~$0.002/query</text>

  <!-- === Bottom stats === -->
  <line stroke="#45405e" stroke-width="1" x1="24" y1="454" x2="796" y2="454"/>

  <!-- Demo result -->
  <text fill="#a6e3a1" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="18" font-weight="600" x="410" y="482" text-anchor="middle">98.8% token reduction  &#xB7;  same analytical quality</text>
  <!-- Production note -->
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="11" x="410" y="504" text-anchor="middle">This demo: 68k &#x2192; 800 tokens.  A 15-mile production run: ~160k &#x2192; 800 tokens (99.5%).</text>
  <!-- Raw data note -->
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="11" x="410" y="524" text-anchor="middle">Raw per-second data never leaves your machine.  Every call audit-logged.</text>
  <text fill="#45405e" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="410" y="548" text-anchor="middle">pip install -e . &amp;&amp; biosensor-mcp demo</text>
</svg>
