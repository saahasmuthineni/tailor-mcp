<svg xmlns="http://www.w3.org/2000/svg" width="720" height="390" viewBox="0 0 720 390">
  <defs>
    <pattern id="fp-dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle fill="#1e2533" cx="1" cy="1" r="0.7"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect fill="#0f1117" x="0" y="0" width="720" height="390" rx="8" ry="8"/>
  <rect fill="url(#fp-dots)" x="0" y="0" width="720" height="390" rx="8" ry="8"/>

  <!-- Title -->
  <text fill="#e2e8f0" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="14" font-weight="600" x="360" y="28" text-anchor="middle">Lightweight by design — runs on your machine, not in the cloud</text>
  <text fill="#64748b" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" x="360" y="46" text-anchor="middle">No Docker, no databases to manage, no background processes. One install command, then it just works.</text>

  <!-- ===== Card 1: Two-Command Setup ===== -->
  <rect fill="#1a1f2e" stroke="#2d3748" stroke-width="1" x="16" y="64" width="224" height="158" rx="10" ry="10"/>
  <rect fill="#f97316" x="16" y="64" width="224" height="3" rx="2" ry="2"/>
  <text fill="#64748b" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="9" font-weight="700" x="128" y="86" text-anchor="middle" letter-spacing="1">TWO-COMMAND SETUP</text>
  <line stroke="#2d3748" stroke-width="1" x1="32" y1="93" x2="224" y2="93"/>
  <rect fill="#0d1117" x="32" y="100" width="192" height="50" rx="6" ry="6"/>
  <text fill="#22c55e" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="9" x="43" y="119">$</text>
  <text fill="#e2e8f0" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="9" x="53" y="119">uv tool install tailor-mcp</text>
  <text fill="#22c55e" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="9" x="43" y="138">$</text>
  <text fill="#e2e8f0" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="9" x="53" y="138">tailor pilot</text>
  <text fill="#94a3b8" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="128" y="167" text-anchor="middle">3-prompt wizard registers with</text>
  <text fill="#94a3b8" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="128" y="181" text-anchor="middle">Claude Desktop. Done.</text>
  <text fill="#22c55e" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="9" font-weight="600" x="128" y="207" text-anchor="middle">uv + Claude Desktop — the only prereqs.</text>

  <!-- ===== Card 2: What's on Disk ===== -->
  <rect fill="#1a1f2e" stroke="#2d3748" stroke-width="1" x="248" y="64" width="224" height="158" rx="10" ry="10"/>
  <rect fill="#60a5fa" x="248" y="64" width="224" height="3" rx="2" ry="2"/>
  <text fill="#64748b" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="9" font-weight="700" x="360" y="86" text-anchor="middle" letter-spacing="1">WHAT'S ON DISK</text>
  <line stroke="#2d3748" stroke-width="1" x1="264" y1="93" x2="456" y2="93"/>
  <text fill="#94a3b8" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="10" x="268" y="115">Package</text>
  <text fill="#64748b" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="10" x="388" y="115">525 KB</text>
  <text fill="#94a3b8" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="10" x="268" y="135">SQLite databases</text>
  <text fill="#64748b" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="10" x="388" y="135">~3 MB</text>
  <text fill="#94a3b8" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="10" x="268" y="155">Vault notes</text>
  <text fill="#64748b" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="10" x="388" y="155">~75 KB</text>
  <line stroke="#2d3748" stroke-width="1" x1="264" y1="167" x2="456" y2="167"/>
  <text fill="#e2e8f0" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="10" font-weight="600" x="268" y="185">Total (3 months)</text>
  <text fill="#f97316" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="10" font-weight="600" x="388" y="185">~4 MB</text>
  <text fill="#64748b" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="360" y="207" text-anchor="middle">Smaller than a single photo.</text>

  <!-- ===== Card 3: No Infrastructure ===== -->
  <rect fill="#1a1f2e" stroke="#2d3748" stroke-width="1" x="480" y="64" width="224" height="158" rx="10" ry="10"/>
  <rect fill="#22c55e" x="480" y="64" width="224" height="3" rx="2" ry="2"/>
  <text fill="#64748b" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="9" font-weight="700" x="592" y="86" text-anchor="middle" letter-spacing="1">NO INFRASTRUCTURE</text>
  <line stroke="#2d3748" stroke-width="1" x1="496" y1="93" x2="688" y2="93"/>
  <circle fill="#22c55e" cx="503" cy="111" r="3"/>
  <text fill="#e2e8f0" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" x="514" y="115">No Docker</text>
  <circle fill="#22c55e" cx="503" cy="132" r="3"/>
  <text fill="#e2e8f0" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" x="514" y="136">No Postgres / Redis</text>
  <circle fill="#22c55e" cx="503" cy="153" r="3"/>
  <text fill="#e2e8f0" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" x="514" y="157">No cloud services</text>
  <circle fill="#22c55e" cx="503" cy="174" r="3"/>
  <text fill="#e2e8f0" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" x="514" y="178">No background daemons</text>
  <circle fill="#22c55e" cx="503" cy="195" r="3"/>
  <text fill="#e2e8f0" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" x="514" y="199">No API keys to manage*</text>

  <!-- ===== HOW IT RUNS row ===== -->
  <rect fill="#1a1f2e" stroke="#2d3748" stroke-width="1" x="16" y="236" width="688" height="130" rx="10" ry="10"/>
  <text fill="#64748b" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="9" font-weight="700" x="360" y="256" text-anchor="middle" letter-spacing="1">HOW IT RUNS</text>
  <line stroke="#2d3748" stroke-width="1" x1="32" y1="263" x2="688" y2="263"/>
  <!-- Stage 1 -->
  <rect fill="#1e2035" stroke="#3d4a6b" stroke-width="1" x="40" y="275" width="170" height="52" rx="8" ry="8"/>
  <text fill="#e2e8f0" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" x="125" y="296" text-anchor="middle">Claude Desktop</text>
  <text fill="#64748b" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="125" y="312" text-anchor="middle">starts server on demand</text>
  <!-- Arrow -->
  <line stroke="#4b5563" stroke-width="1.5" x1="216" y1="301" x2="254" y2="301"/>
  <polygon fill="#4b5563" points="254,296 264,301 254,306"/>
  <!-- Stage 2 -->
  <rect fill="#0f1e35" stroke="#1e3a5f" stroke-width="1" x="270" y="275" width="180" height="52" rx="8" ry="8"/>
  <text fill="#60a5fa" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="11" font-weight="600" x="360" y="296" text-anchor="middle">tailor serve</text>
  <text fill="#64748b" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="360" y="312" text-anchor="middle">local Python · ~60 MB RAM</text>
  <!-- Arrow -->
  <line stroke="#4b5563" stroke-width="1.5" x1="456" y1="301" x2="494" y2="301"/>
  <polygon fill="#4b5563" points="494,296 504,301 494,306"/>
  <!-- Stage 3 -->
  <rect fill="#0f2020" stroke="#1e3d2a" stroke-width="1" x="510" y="275" width="180" height="52" rx="8" ry="8"/>
  <text fill="#22c55e" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" x="600" y="296" text-anchor="middle">SQLite + Markdown</text>
  <text fill="#64748b" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="600" y="312" text-anchor="middle">~4 MB on disk, all local</text>

  <text fill="#64748b" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="9" x="360" y="346" text-anchor="middle">Stops when Claude Desktop closes. No orphan processes.</text>

  <!-- Footnote -->
  <text fill="#64748b" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="9" x="360" y="372" text-anchor="middle">*CSV, MATLAB, and REDCap children need no API key. Strava child requires an OAuth token (optional worked example).</text>
  <text fill="#64748b" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="9" x="360" y="384" text-anchor="middle">3 runtime deps: mcp, orjson, requests.</text>
</svg>
