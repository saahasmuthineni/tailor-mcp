  <text fill="#374151" font-family="-apple-system,Segoe UI,system-ui,sans-serif"
        font-size="10" font-weight="700" letter-spacing="1.8" x="680" y="266">TOKEN EFFICIENCY</text>

  <!-- Big token number -->
  <text fill="#e2e8f0" font-family="-apple-system,Segoe UI,system-ui,sans-serif"
        font-size="62" font-weight="900" x="672" y="350">&#x7E;1,000x</text>

  <!-- Subtext -->
  <text fill="#4b5563" font-family="-apple-system,Segoe UI,system-ui,sans-serif"
        font-size="13" x="680" y="374">fewer tokens. every query.</text>
  <!-- FIXED: was "from 5 real sessions" (misleading — these are benchmark measurements, not session logs) -->
  <text fill="#374151" font-family="-apple-system,Segoe UI,system-ui,sans-serif"
        font-size="11" x="680" y="392">benchmark &#x2014; reproducible</text>

  <!-- Vertical divider between TOKEN EFFICIENCY and WARDROBE MEMORY -->
  <line stroke="#1e2533" stroke-width="1" x1="938" y1="250" x2="938" y2="442"/>

  <!-- WARDROBE MEMORY (right half) -->
  <text fill="#374151" font-family="-apple-system,Segoe UI,system-ui,sans-serif"
        font-size="10" font-weight="700" letter-spacing="1.8" x="956" y="266">WARDROBE MEMORY</text>

  <!-- Legend -->
  <circle fill="#22c55e" cx="960" cy="280" r="4"/>
  <text fill="#4b5563" font-family="-apple-system,Segoe UI,system-ui,sans-serif"
        font-size="10" x="968" y="284">THEMES</text>
  <circle fill="#f97316" cx="1026" cy="280" r="4"/>
  <text fill="#4b5563" font-family="-apple-system,Segoe UI,system-ui,sans-serif"
        font-size="10" x="1034" y="284">COST</text>

  <!-- Bar chart: baseline y=432; bars grow upward -->
  <!-- Session 3 — small group -->
  <rect fill="#f97316" x="974" y="394" width="22" height="38" rx="2"/>   <!-- COST bar -->
  <rect fill="#22c55e" x="1000" y="374" width="22" height="58" rx="2"/>  <!-- THEMES bar -->
  <text fill="#e2e8f0" font-family="-apple-system,Segoe UI,system-ui,sans-serif"
        font-size="12" font-weight="700" x="1000" y="367" text-anchor="middle">3</text>

  <!-- Session 7 — medium group -->
  <rect fill="#f97316" x="1072" y="372" width="22" height="60" rx="2"/>  <!-- COST bar -->
  <rect fill="#22c55e" x="1098" y="346" width="22" height="86" rx="2"/>  <!-- THEMES bar -->
  <text fill="#e2e8f0" font-family="-apple-system,Segoe UI,system-ui,sans-serif"
        font-size="12" font-weight="700" x="1098" y="339" text-anchor="middle">7</text>

  <!-- Session 13 — tall group -->
  <rect fill="#f97316" x="1170" y="350" width="22" height="82" rx="2"/>  <!-- COST bar -->
  <rect fill="#22c55e" x="1196" y="314" width="22" height="118" rx="2"/> <!-- THEMES bar -->
  <text fill="#e2e8f0" font-family="-apple-system,Segoe UI,system-ui,sans-serif"
        font-size="12" font-weight="700" x="1196" y="307" text-anchor="middle">13</text>

  <!-- Dashed trend line through tops of THEMES bars -->
  <polyline stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3" fill="none"
            points="1011,374 1109,346 1207,314"/>

  <!-- Y-axis hint -->
  <text fill="#374151" font-family="-apple-system,Segoe UI,system-ui,sans-serif"
        font-size="10" x="956" y="434">100%</text>

  <!-- "builds on every session." callout -->
  <text fill="#22c55e" font-family="-apple-system,Segoe UI,system-ui,sans-serif"
        font-size="11" font-weight="600" x="1250" y="442" text-anchor="end">builds on every session.</text>

  <!-- ===== BOTTOM SECTION: DATA TYPE → tAIlor → AI PROVIDER ===== -->
  <rect fill="#0d1117" stroke="#1e2533" stroke-width="1"
        x="660" y="462" width="600" height="120" rx="6" ry="6"/>

  <!-- DATA TYPE label -->
  <text fill="#374151" font-family="-apple-system,Segoe UI,system-ui,sans-serif"
        font-size="10" font-weight="700" letter-spacing="1.8" x="680" y="484">DATA TYPE</text>

  <!-- File type entries -->
  <circle fill="#4b5563" cx="686" cy="506" r="3"/>
  <text fill="#94a3b8" font-family="SF Mono,Fira Code,Consolas,monospace"
        font-size="13" x="695" y="510">.csv</text>
  <circle fill="#4b5563" cx="686" cy="525" r="3"/>
  <text fill="#94a3b8" font-family="SF Mono,Fira Code,Consolas,monospace"
        font-size="13" x="695" y="529">.json</text>
  <circle fill="#4b5563" cx="686" cy="544" r="3"/>
  <text fill="#94a3b8" font-family="SF Mono,Fira Code,Consolas,monospace"
        font-size="13" x="695" y="548">.log</text>

  <!-- Fan lines from data types → tAIlor box -->
  <line stroke="#374151" stroke-width="0.8" x1="730" y1="506" x2="838" y2="516"/>
  <line stroke="#374151" stroke-width="0.8" x1="742" y1="525" x2="838" y2="521"/>
  <line stroke="#374151" stroke-width="0.8" x1="730" y1="544" x2="838" y2="526"/>

  <!-- tAIlor box (orange border — matches RouterMCP/gateway role in this context) -->
  <rect fill="#1a0e00" stroke="#f97316" stroke-width="2"
        x="838" y="502" width="118" height="42" rx="8" ry="8"/>
  <text font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="17" font-weight="700"
        x="897" y="528" text-anchor="middle">
    <tspan fill="#94a3b8">t</tspan><tspan fill="#60a5fa">AI</tspan><tspan fill="#94a3b8">lor</tspan>
  </text>

  <!-- Fan lines from tAIlor → AI providers -->
  <line stroke="#22c55e" stroke-width="0.8" x1="956" y1="516" x2="984" y2="507"/>
  <line stroke="#22c55e" stroke-width="0.8" x1="956" y1="523" x2="984" y2="524"/>
  <line stroke="#22c55e" stroke-width="0.8" x1="956" y1="530" x2="984" y2="541"/>

  <!-- AI PROVIDER label -->
  <text fill="#374151" font-family="-apple-system,Segoe UI,system-ui,sans-serif"
        font-size="10" font-weight="700" letter-spacing="1.8" x="988" y="484">AI PROVIDER</text>

  <!-- Provider list -->
  <circle fill="#22c55e" cx="984" cy="507" r="4"/>
  <text fill="#94a3b8" font-family="-apple-system,Segoe UI,system-ui,sans-serif"
        font-size="13" x="994" y="511">Claude</text>
  <circle fill="#22c55e" cx="984" cy="524" r="4"/>
  <text fill="#94a3b8" font-family="-apple-system,Segoe UI,system-ui,sans-serif"
        font-size="13" x="994" y="528">GPT-4</text>
  <circle fill="#22c55e" cx="984" cy="541" r="4"/>
  <text fill="#94a3b8" font-family="-apple-system,Segoe UI,system-ui,sans-serif"
        font-size="13" x="994" y="545">any AI</text>

  <!-- ===== BOTTOM BAR ===== -->
  <rect fill="#0d1117" x="0" y="590" width="1280" height="50"/>
  <!-- Orange top accent line -->
  <line stroke="#f97316" stroke-width="2" x1="0" y1="590" x2="1280" y2="590"/>

  <!-- Bottom bar text -->
  <text fill="#4b5563" font-family="-apple-system,Segoe UI,system-ui,sans-serif"
        font-size="14" x="44" y="622">local-first. no cloud required.</text>
  <text fill="#4b5563" font-family="-apple-system,Segoe UI,system-ui,sans-serif"
        font-size="14" x="1236" y="622" text-anchor="end">tailor-mcp &#xB7; AGPL-3.0-or-later</text>
</svg>
