<svg xmlns="http://www.w3.org/2000/svg" width="720" height="390" viewBox="0 0 720 390">
  <defs>
    <pattern id="vi-dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle fill="#1e2533" cx="1" cy="1" r="0.7"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect fill="#0f1117" x="0" y="0" width="720" height="390" rx="8" ry="8"/>
  <rect fill="url(#vi-dots)" x="0" y="0" width="720" height="390" rx="8" ry="8"/>

  <!-- Title -->
  <text fill="#e2e8f0" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="14" font-weight="600" x="360" y="28" text-anchor="middle">Analytical reasoning persists and compounds across sessions</text>
  <text fill="#64748b" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" x="360" y="46" text-anchor="middle">Each session annotates vault notes with insights. Future sessions inherit all prior reasoning.</text>

  <!-- Timeline connector line -->
  <line stroke="#2d3748" stroke-width="2" x1="120" y1="152" x2="600" y2="152"/>

  <!-- ===== SESSION 1 ===== -->
  <rect fill="#1a1f2e" stroke="#2d3748" stroke-width="1" x="16" y="64" width="210" height="190" rx="10" ry="10"/>
  <rect fill="#4b5563" x="16" y="64" width="210" height="3" rx="2" ry="2"/>
  <!-- Timeline dot -->
  <circle fill="#1a1f2e" stroke="#4b5563" stroke-width="2" cx="120" cy="152" r="8"/>
  <circle fill="#4b5563" cx="120" cy="152" r="4"/>
  <!-- Header -->
  <text fill="#64748b" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="9" font-weight="700" x="32" y="84" letter-spacing="1">SESSION 1</text>
  <text fill="#e2e8f0" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="12" font-weight="600" x="32" y="102">Analysis run + saved</text>
  <line stroke="#2d3748" stroke-width="1" x1="32" y1="110" x2="210" y2="110"/>
  <!-- Data block -->
  <rect fill="#0d1117" x="32" y="118" width="178" height="46" rx="4" ry="4"/>
  <text fill="#94a3b8" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="9" x="40" y="133">peak_force: 65.3 N</text>
  <text fill="#94a3b8" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="9" x="40" y="151">decline_pct: 76.1%  t50: 8.4s</text>
  <!-- Insight placeholder (no insight yet — structurally parallel to Sessions 4/8+) -->
  <rect fill="#0d1117" stroke="#2d3748" stroke-width="1" x="32" y="170" width="178" height="30" rx="4" ry="4"/>
  <text fill="#4b5563" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="8" font-style="italic" x="38" y="182">(no insight yet —</text>
  <text fill="#4b5563" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="8" font-style="italic" x="38" y="194"> baseline established)</text>
  <!-- Token badge -->
  <rect fill="#0f2020" stroke="#1e3d2a" stroke-width="1" x="32" y="206" width="178" height="28" rx="6" ry="6"/>
  <text fill="#22c55e" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="9" font-weight="600" x="121" y="218" text-anchor="middle">note stored: ~800 tokens</text>
  <text fill="#64748b" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="8" x="121" y="230" text-anchor="middle">vs ~68,000 if sent raw</text>
  <!-- Muted baseline annotation -->
  <text fill="#64748b" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="8" font-style="italic" x="121" y="248" text-anchor="middle">raw baseline: ~68,000 tokens</text>

  <!-- Arrow 1 -->
  <polygon fill="#4b5563" points="232,152 244,147 244,157"/>

  <!-- ===== SESSION 4 ===== -->
  <rect fill="#1a1f2e" stroke="#22c55e" stroke-width="1.5" x="255" y="64" width="210" height="190" rx="10" ry="10"/>
  <rect fill="#22c55e" x="255" y="64" width="210" height="3" rx="2" ry="2"/>
  <!-- Timeline dot -->
  <circle fill="#1a1f2e" stroke="#22c55e" stroke-width="2" cx="360" cy="152" r="8"/>
  <circle fill="#22c55e" cx="360" cy="152" r="4"/>
  <!-- Header -->
  <text fill="#22c55e" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="9" font-weight="700" x="271" y="84" letter-spacing="1">SESSION 4</text>
  <text fill="#e2e8f0" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="12" font-weight="600" x="271" y="102">Claude annotates insight</text>
  <line stroke="#2d3748" stroke-width="1" x1="271" y1="110" x2="449" y2="110"/>
  <!-- Data block -->
  <rect fill="#0d1117" x="271" y="118" width="178" height="46" rx="4" ry="4"/>
  <text fill="#94a3b8" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="9" x="279" y="133">peak_force: 68.1 N</text>
  <text fill="#94a3b8" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="9" x="279" y="151">decline_pct: 58.3%  t50: 11.2s</text>
  <!-- Insight block -->
  <rect fill="#0f2020" stroke="#1e3d2a" stroke-width="1" x="271" y="170" width="178" height="30" rx="4" ry="4"/>
  <text fill="#22c55e" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="8" x="277" y="182">"Decline rate improving:</text>
  <text fill="#22c55e" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="8" x="277" y="194"> 76.1% &#x2192; 58.3% in 4 sessions"</text>
  <!-- Token badge -->
  <rect fill="#0f2020" stroke="#1e3d2a" stroke-width="1" x="271" y="206" width="178" height="28" rx="6" ry="6"/>
  <text fill="#22c55e" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="9" font-weight="600" x="360" y="218" text-anchor="middle">reads 4 notes: ~3,200 tokens</text>
  <text fill="#64748b" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="8" x="360" y="230" text-anchor="middle">vs re-processing: ~272,000 tokens</text>
  <!-- Savings badge -->
  <rect fill="#14532d" x="313" y="238" width="94" height="14" rx="7" ry="7"/>
  <text fill="#ffffff" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="9" font-weight="600" x="360" y="248" text-anchor="middle">85&#xD7; cheaper</text>

  <!-- Arrow 2 -->
  <polygon fill="#0ea5e9" points="471,152 483,147 483,157"/>

  <!-- ===== SESSION 8+ ===== -->
  <rect fill="#1a1f2e" stroke="#0ea5e9" stroke-width="1.5" x="494" y="64" width="210" height="190" rx="10" ry="10"/>
  <rect fill="#0ea5e9" x="494" y="64" width="210" height="3" rx="2" ry="2"/>
  <!-- Timeline dot -->
  <circle fill="#1a1f2e" stroke="#0ea5e9" stroke-width="2" cx="600" cy="152" r="8"/>
  <circle fill="#0ea5e9" cx="600" cy="152" r="4"/>
  <!-- Header -->
  <text fill="#0ea5e9" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="9" font-weight="700" x="510" y="84" letter-spacing="1">SESSION 8+</text>
  <text fill="#e2e8f0" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="12" font-weight="600" x="510" y="102">Builds on prior insights</text>
  <line stroke="#2d3748" stroke-width="1" x1="510" y1="110" x2="688" y2="110"/>
  <!-- Data block -->
  <rect fill="#0d1117" x="510" y="118" width="178" height="46" rx="4" ry="4"/>
  <text fill="#94a3b8" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="9" x="518" y="133">peak_force: 71.4 N</text>
  <text fill="#94a3b8" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="9" x="518" y="151">decline_pct: 43.2%  t50: 14.1s</text>
  <!-- Insight block -->
  <rect fill="#0c1a2a" stroke="#0e3058" stroke-width="1" x="510" y="170" width="178" height="30" rx="4" ry="4"/>
  <text fill="#0ea5e9" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="8" x="516" y="182">"Fatigue resistance confirmed:</text>
  <text fill="#0ea5e9" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="8" x="516" y="194"> 76.1% &#x2192; 43.2% + duration &#x2191;"</text>
  <!-- Token badge -->
  <rect fill="#0f2020" stroke="#1e3d2a" stroke-width="1" x="510" y="206" width="178" height="28" rx="6" ry="6"/>
  <text fill="#22c55e" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="9" font-weight="600" x="599" y="218" text-anchor="middle">reads 8 notes: ~6,400 tokens</text>
  <text fill="#64748b" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="8" x="599" y="230" text-anchor="middle">vs re-processing: ~544,000 tokens</text>
  <!-- Savings badge -->
  <rect fill="#14532d" x="553" y="238" width="94" height="14" rx="7" ry="7"/>
  <text fill="#ffffff" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="9" font-weight="600" x="600" y="248" text-anchor="middle">85&#xD7; cheaper</text>

  <!-- ===== Bottom summary bar ===== -->
  <rect fill="#1a1f2e" stroke="#2d3748" stroke-width="1" x="16" y="276" width="688" height="104" rx="8" ry="8"/>

  <text fill="#f97316" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" x="32" y="298">vault_annotate_run</text>
  <text fill="#94a3b8" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="32" y="314">Writes timestamped observations</text>
  <text fill="#94a3b8" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="32" y="330">back to vault notes.</text>
  <text fill="#94a3b8" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="32" y="346">Insights stack chronologically.</text>

  <line stroke="#2d3748" stroke-width="1" x1="245" y1="288" x2="245" y2="372"/>

  <text fill="#60a5fa" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" x="261" y="298">vault_capture_session</text>
  <text fill="#94a3b8" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="261" y="314">Before session ends, Claude saves</text>
  <text fill="#94a3b8" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="261" y="330">key insights and theme updates.</text>
  <text fill="#94a3b8" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="261" y="346">Works with any data source.</text>

  <line stroke="#2d3748" stroke-width="1" x1="474" y1="288" x2="474" y2="372"/>

  <text fill="#22c55e" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" x="490" y="298">Token benefit</text>
  <text fill="#94a3b8" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="490" y="314">Insights cost nothing extra to read.</text>
  <text fill="#94a3b8" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="490" y="330">8 notes + insights: ~6,400 tokens</text>
  <text fill="#22c55e" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="490" y="346">vs ~544,000 re-processed (85&#xD7;).</text>
</svg>
