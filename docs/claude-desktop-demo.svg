<svg xmlns="http://www.w3.org/2000/svg" width="720" height="580" viewBox="0 0 720 580">
  <!-- Background -->
  <rect fill="#f8f9fa" x="0" y="0" width="720" height="580" rx="8" ry="8"/>

  <!-- Header bar -->
  <rect fill="#ffffff" x="0" y="0" width="720" height="48" rx="8" ry="8"/>
  <rect fill="#ffffff" x="0" y="16" width="720" height="32"/>
  <line stroke="#e5e7eb" stroke-width="1" x1="0" y1="48" x2="720" y2="48"/>
  <text fill="#1a1a1a" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="14" font-weight="600" x="24" y="28">Claude</text>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" x="24" y="42">biosensor-mcp connected</text>

  <!-- User message -->
  <text fill="#9ca3af" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="620" y="68">You</text>
  <rect fill="#f3f0ff" x="448" y="74" width="248" height="34" rx="14" ry="14"/>
  <text fill="#1a1a1a" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="13" x="470" y="96">How was my last run?</text>

  <!-- Claude avatar -->
  <circle fill="#d97706" cx="32" cy="136" r="12"/>
  <text fill="#ffffff" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" font-weight="700" x="32" y="140" text-anchor="middle">C</text>

  <!-- Claude response bubble -->
  <rect fill="#ffffff" stroke="#e5e7eb" stroke-width="1" x="52" y="120" width="644" height="200" rx="14" ry="14"/>

  <!-- Response content -->
  <text fill="#1a1a1a" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="13" font-weight="600" x="70" y="144">Thursday Recovery Run</text>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" x="70" y="160">6.65 mi &#xB7; 60:00 &#xB7; Apr 9, 2026</text>
  <line stroke="#e5e7eb" stroke-width="1" x1="70" y1="170" x2="678" y2="170"/>

  <!-- Metric row -->
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="70" y="188">Pace</text>
  <text fill="#1a1a1a" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="12" font-weight="600" x="70" y="204">8:58/mi</text>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="190" y="188">HR</text>
  <text fill="#1a1a1a" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="12" font-weight="600" x="190" y="204">156 bpm</text>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="310" y="188">Decoupling</text>
  <text fill="#1a1a1a" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="12" font-weight="600" x="310" y="204">7.8%</text>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="430" y="188">Efficiency</text>
  <text fill="#1a1a1a" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="12" font-weight="600" x="430" y="204">57.82 EF</text>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="560" y="188">Drift</text>
  <text fill="#1a1a1a" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="12" font-weight="600" x="560" y="204">5.3%</text>

  <line stroke="#e5e7eb" stroke-width="1" x1="70" y1="216" x2="678" y2="216"/>

  <!-- Zones + splits condensed -->
  <text fill="#1a1a1a" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="12" x="70" y="236">HR Zones: Z3 8.1% &#xB7; Z4 90.8% &#xB7; Z5 1.1%</text>
  <text fill="#1a1a1a" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="12" x="70" y="254">Splits: 8:48 &#x2192; 9:12 (steady negative split, no anomalies)</text>

  <line stroke="#e5e7eb" stroke-width="1" x1="70" y1="268" x2="678" y2="268"/>

  <!-- Vault save notice -->
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" x="70" y="286">Saved to your Obsidian vault. Ask me to compare with previous runs.</text>

  <!-- Cost badge inside response -->
  <rect fill="#ecfdf5" x="548" y="276" width="130" height="22" rx="10" ry="10"/>
  <text fill="#059669" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="10" font-weight="600" x="613" y="291" text-anchor="middle">~800 tokens &#xB7; $0.01</text>

  <!-- === THREE VALUE PROP CARDS === -->

  <!-- Card 1: Token Efficiency -->
  <rect fill="#ffffff" stroke="#e5e7eb" stroke-width="1" x="24" y="340" width="216" height="220" rx="10" ry="10"/>
  <text fill="#1a1a1a" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="12" font-weight="600" x="132" y="366" text-anchor="middle">Token Efficiency</text>
  <line stroke="#e5e7eb" stroke-width="1" x1="40" y1="376" x2="224" y2="376"/>
  <!-- "Without" bar -->
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="40" y="396">Without middleware</text>
  <rect fill="#fee2e2" x="40" y="402" width="184" height="20" rx="4" ry="4"/>
  <rect fill="#ef4444" x="40" y="402" width="184" height="20" rx="4" ry="4" opacity="0.6"/>
  <text fill="#991b1b" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="9" font-weight="600" x="132" y="416" text-anchor="middle">~200,000 tokens  &#xB7;  $60/mo</text>
  <!-- "With" bar -->
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="40" y="444">With biosensor-mcp</text>
  <rect fill="#dcfce7" x="40" y="450" width="184" height="20" rx="4" ry="4"/>
  <rect fill="#22c55e" x="40" y="450" width="1" height="20" rx="0" ry="0" opacity="0.8"/>
  <text fill="#166534" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="9" font-weight="600" x="54" y="464">~800 tokens  &#xB7;  $0.02</text>
  <!-- Reduction stat -->
  <text fill="#059669" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="22" font-weight="600" x="132" y="504" text-anchor="middle">99.6%</text>
  <text fill="#059669" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" x="132" y="520" text-anchor="middle">reduction</text>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="132" y="540" text-anchor="middle">Same analytical quality</text>

  <!-- Card 2: Data Security -->
  <rect fill="#ffffff" stroke="#e5e7eb" stroke-width="1" x="252" y="340" width="216" height="220" rx="10" ry="10"/>
  <text fill="#1a1a1a" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="12" font-weight="600" x="360" y="366" text-anchor="middle">Data Security</text>
  <line stroke="#e5e7eb" stroke-width="1" x1="268" y1="376" x2="452" y2="376"/>
  <!-- Shield icon area -->
  <circle fill="#eff6ff" cx="360" cy="406" r="18"/>
  <text fill="#3b82f6" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="18" x="360" y="412" text-anchor="middle">&#x1F512;</text>
  <!-- Security features -->
  <text fill="#1a1a1a" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" x="360" y="444" text-anchor="middle">Biometric data stays local</text>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="360" y="462" text-anchor="middle">Raw streams never reach the model</text>
  <line stroke="#e5e7eb" stroke-width="1" x1="268" y1="474" x2="452" y2="474"/>
  <!-- Checklist -->
  <text fill="#059669" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" x="280" y="494">&#x2713;  Session-scoped consent</text>
  <text fill="#059669" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" x="280" y="514">&#x2713;  Every call audit-logged</text>
  <text fill="#059669" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" x="280" y="534">&#x2713;  Cloud-sync detection</text>

  <!-- Card 3: Access Tiers -->
  <rect fill="#ffffff" stroke="#e5e7eb" stroke-width="1" x="480" y="340" width="216" height="220" rx="10" ry="10"/>
  <text fill="#1a1a1a" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="12" font-weight="600" x="588" y="366" text-anchor="middle">Context Window Tiers</text>
  <line stroke="#e5e7eb" stroke-width="1" x1="496" y1="376" x2="680" y2="376"/>
  <!-- Tier 1 -->
  <rect fill="#dcfce7" x="496" y="386" width="168" height="40" rx="6" ry="6"/>
  <text fill="#166534" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" x="504" y="404">Tier 1: Free</text>
  <text fill="#166534" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="10" x="504" y="418">200&#x2013;1,500 tok &#xB7; No gate</text>
  <!-- Tier 2 -->
  <rect fill="#fef9c3" x="496" y="434" width="168" height="40" rx="6" ry="6"/>
  <text fill="#854d0e" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" x="504" y="452">Tier 2: Consent</text>
  <text fill="#854d0e" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="10" x="504" y="466">3&#x2013;7k tok &#xB7; Bio consent</text>
  <!-- Tier 3 -->
  <rect fill="#fee2e2" x="496" y="482" width="168" height="40" rx="6" ry="6"/>
  <text fill="#991b1b" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" x="504" y="500">Tier 3: Cost-gated</text>
  <text fill="#991b1b" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="10" x="504" y="514">25&#x2013;60k tok &#xB7; Approval</text>
  <!-- Callout -->
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="588" y="542" text-anchor="middle">~90% answered at Tier 1</text>
</svg>
