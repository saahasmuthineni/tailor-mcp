<svg xmlns="http://www.w3.org/2000/svg" width="720" height="620" viewBox="0 0 720 620">
  <!-- Background -->
  <rect fill="#f8f9fa" x="0" y="0" width="720" height="620" rx="8" ry="8"/>

  <!-- ============ SESSION 1 (left panel) ============ -->
  <rect fill="#ffffff" stroke="#e5e7eb" stroke-width="1" x="16" y="12" width="338" height="282" rx="10" ry="10"/>
  <!-- Panel header -->
  <rect fill="#f9fafb" x="16" y="12" width="338" height="32" rx="10" ry="10"/>
  <rect fill="#f9fafb" x="16" y="28" width="338" height="16"/>
  <line stroke="#e5e7eb" stroke-width="1" x1="16" y1="44" x2="354" y2="44"/>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" font-weight="600" x="32" y="33">SESSION 1</text>
  <text fill="#9ca3af" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="264" y="33">Tuesday 7pm</text>

  <!-- User message -->
  <rect fill="#f3f0ff" x="158" y="54" width="186" height="28" rx="12" ry="12"/>
  <text fill="#1a1a1a" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" x="174" y="73">How was my last run?</text>

  <!-- Claude response -->
  <circle fill="#d97706" cx="30" cy="100" r="10"/>
  <text fill="#ffffff" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="9" font-weight="700" x="30" y="104" text-anchor="middle">C</text>

  <rect fill="#ffffff" stroke="#e5e7eb" stroke-width="1" x="46" y="90" width="298" height="146" rx="10" ry="10"/>
  <text fill="#1a1a1a" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" x="58" y="110">Thursday Recovery Run</text>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="58" y="126">6.65 mi &#xB7; 60 min &#xB7; 156 avg HR</text>
  <line stroke="#f3f4f6" stroke-width="1" x1="58" y1="134" x2="334" y2="134"/>
  <text fill="#1a1a1a" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="10" x="58" y="150">Pace 8:58  HR drift 5.3%</text>
  <text fill="#1a1a1a" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="10" x="58" y="166">Decoupling 7.8%  EF 57.82</text>
  <text fill="#1a1a1a" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="10" x="58" y="182">Zones: Z3 8% Z4 91% Z5 1%</text>
  <line stroke="#f3f4f6" stroke-width="1" x1="58" y1="192" x2="334" y2="192"/>
  <!-- Vault save indicator -->
  <text fill="#059669" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" font-weight="600" x="58" y="208">&#x2713; Saved to Obsidian vault</text>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="58" y="224">as a structured markdown note</text>

  <!-- Token badge -->
  <rect fill="#ecfdf5" x="244" y="240" width="96" height="20" rx="10" ry="10"/>
  <text fill="#059669" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="9" font-weight="600" x="292" y="254" text-anchor="middle">~800 tokens</text>

  <!-- Vault arrow connecting sessions -->
  <rect fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" stroke-dasharray="4,3" x="146" y="268" width="76" height="22" rx="6" ry="6"/>
  <text fill="#166534" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="9" font-weight="600" x="184" y="283" text-anchor="middle">&#x1F4BE; vault</text>

  <!-- ============ SESSION 2 (right panel) ============ -->
  <rect fill="#ffffff" stroke="#e5e7eb" stroke-width="1" x="366" y="12" width="338" height="282" rx="10" ry="10"/>
  <!-- Panel header -->
  <rect fill="#f9fafb" x="366" y="12" width="338" height="32" rx="10" ry="10"/>
  <rect fill="#f9fafb" x="366" y="28" width="338" height="16"/>
  <line stroke="#e5e7eb" stroke-width="1" x1="366" y1="44" x2="704" y2="44"/>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" font-weight="600" x="382" y="33">SESSION 2</text>
  <text fill="#9ca3af" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="580" y="33">2 months later</text>

  <!-- User message -->
  <rect fill="#f3f0ff" x="414" y="54" width="280" height="28" rx="12" ry="12"/>
  <text fill="#1a1a1a" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" x="426" y="73">How has my fitness changed?</text>

  <!-- Claude response -->
  <circle fill="#d97706" cx="380" cy="100" r="10"/>
  <text fill="#ffffff" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="9" font-weight="700" x="380" y="104" text-anchor="middle">C</text>

  <rect fill="#ffffff" stroke="#e5e7eb" stroke-width="1" x="396" y="90" width="298" height="146" rx="10" ry="10"/>
  <!-- Vault read indicator -->
  <text fill="#2563eb" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" font-weight="600" x="408" y="110">&#x1F4C2; vault_get_fitness_summary</text>
  <line stroke="#f3f4f6" stroke-width="1" x1="408" y1="118" x2="684" y2="118"/>
  <text fill="#1a1a1a" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="408" y="136">Weekly avg pace improved:</text>
  <text fill="#1a1a1a" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="10" x="408" y="152">9:24/mi &#x2192; 8:58/mi over 8 weeks</text>
  <text fill="#1a1a1a" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="408" y="172">Decoupling trend:</text>
  <text fill="#1a1a1a" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="10" x="408" y="188">12.1% &#x2192; 7.8% (aerobic gains)</text>
  <line stroke="#f3f4f6" stroke-width="1" x1="408" y1="198" x2="684" y2="198"/>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="408" y="214">One aggregated call from vault index.</text>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="408" y="228">No raw data re-processed.</text>

  <!-- Token badge -->
  <rect fill="#ecfdf5" x="594" y="240" width="96" height="20" rx="10" ry="10"/>
  <text fill="#059669" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="9" font-weight="600" x="642" y="254" text-anchor="middle">~400 tokens</text>

  <!-- Vault arrow -->
  <rect fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" stroke-dasharray="4,3" x="496" y="268" width="76" height="22" rx="6" ry="6"/>
  <text fill="#166534" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="9" font-weight="600" x="534" y="283" text-anchor="middle">&#x1F4BE; vault</text>

  <!-- ============ CONNECTING ARROW BETWEEN SESSIONS ============ -->
  <line stroke="#86efac" stroke-width="2" stroke-dasharray="6,4" x1="222" y1="279" x2="496" y2="279"/>
  <polygon fill="#86efac" points="490,274 502,279 490,284"/>
  <text fill="#166534" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="9" x="358" y="275" text-anchor="middle">persists across sessions</text>

  <!-- ============ BOTTOM SECTION: THREE INSIGHT CARDS ============ -->

  <!-- Card 1: 170x Longitudinal Efficiency -->
  <rect fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" x="16" y="310" width="232" height="290" rx="10" ry="10"/>
  <text fill="#166534" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="12" font-weight="600" x="132" y="336" text-anchor="middle">Session Memory</text>
  <line stroke="#bbf7d0" stroke-width="1" x1="32" y1="346" x2="232" y2="346"/>
  <!-- Without vault -->
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="32" y="366">Without vault (re-process 8 runs):</text>
  <rect fill="#fee2e2" x="32" y="374" width="200" height="18" rx="4" ry="4"/>
  <rect fill="#ef4444" opacity="0.5" x="32" y="374" width="200" height="18" rx="4" ry="4"/>
  <text fill="#991b1b" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="9" font-weight="600" x="132" y="387" text-anchor="middle">8 &#xD7; 68k = ~544,000 tokens</text>
  <!-- With vault -->
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="32" y="414">With vault (one aggregated call):</text>
  <rect fill="#dcfce7" x="32" y="422" width="200" height="18" rx="4" ry="4"/>
  <rect fill="#22c55e" opacity="0.5" x="32" y="422" width="1" height="18" rx="0" ry="0"/>
  <text fill="#166534" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="9" font-weight="600" x="42" y="435">fitness summary: ~400 tokens</text>
  <!-- Multiplier -->
  <text fill="#059669" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="22" font-weight="600" x="132" y="476" text-anchor="middle">1,360&#xD7;</text>
  <text fill="#059669" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" x="132" y="496" text-anchor="middle">more efficient</text>
  <line stroke="#bbf7d0" stroke-width="1" x1="32" y1="510" x2="232" y2="510"/>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="132" y="530" text-anchor="middle">vault_get_fitness_summary</text>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="132" y="546" text-anchor="middle">reads indexed frontmatter,</text>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="132" y="562" text-anchor="middle">not full note bodies.</text>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="132" y="578" text-anchor="middle">Browse notes in Obsidian</text>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="132" y="594" text-anchor="middle">or read individually at ~800/note.</text>

  <!-- Card 2: Token Efficiency (per-query) -->
  <rect fill="#ffffff" stroke="#e5e7eb" stroke-width="1" x="260" y="310" width="216" height="290" rx="10" ry="10"/>
  <text fill="#1a1a1a" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="12" font-weight="600" x="368" y="336" text-anchor="middle">Per-Query Savings</text>
  <line stroke="#e5e7eb" stroke-width="1" x1="276" y1="346" x2="460" y2="346"/>
  <!-- Raw bar -->
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="276" y="366">Raw streams to model:</text>
  <rect fill="#fee2e2" x="276" y="374" width="184" height="18" rx="4" ry="4"/>
  <rect fill="#ef4444" opacity="0.5" x="276" y="374" width="184" height="18" rx="4" ry="4"/>
  <text fill="#991b1b" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="9" font-weight="600" x="368" y="387" text-anchor="middle">~68,000 tokens</text>
  <!-- Compressed bar -->
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="276" y="414">Server-computed report:</text>
  <rect fill="#dcfce7" x="276" y="422" width="184" height="18" rx="4" ry="4"/>
  <rect fill="#22c55e" opacity="0.5" x="276" y="422" width="2" height="18" rx="0" ry="0"/>
  <text fill="#166534" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="9" font-weight="600" x="286" y="435">~800 tokens</text>
  <!-- Stats -->
  <text fill="#059669" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="20" font-weight="600" x="368" y="472" text-anchor="middle">98.8%</text>
  <text fill="#059669" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" x="368" y="490" text-anchor="middle">reduction</text>
  <line stroke="#e5e7eb" stroke-width="1" x1="276" y1="502" x2="460" y2="502"/>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="368" y="520" text-anchor="middle">Demo: 60 min, 6.65 mi run</text>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="368" y="536" text-anchor="middle">Production 15-mi run:</text>
  <text fill="#6b7280" font-family="SF Mono,Fira Code,Consolas,monospace" font-size="10" x="368" y="552" text-anchor="middle">~160k &#x2192; 800 tok (99.5%)</text>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="368" y="568" text-anchor="middle">Same analytical quality.</text>

  <!-- Card 3: Data Security -->
  <rect fill="#ffffff" stroke="#e5e7eb" stroke-width="1" x="488" y="310" width="216" height="290" rx="10" ry="10"/>
  <text fill="#1a1a1a" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="12" font-weight="600" x="596" y="336" text-anchor="middle">Data Security</text>
  <line stroke="#e5e7eb" stroke-width="1" x1="504" y1="346" x2="688" y2="346"/>
  <!-- Shield -->
  <circle fill="#eff6ff" cx="596" cy="378" r="20"/>
  <text fill="#3b82f6" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="20" x="596" y="385" text-anchor="middle">&#x1F512;</text>
  <!-- Description -->
  <text fill="#1a1a1a" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" x="596" y="416" text-anchor="middle">Biometric data stays local</text>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="596" y="434" text-anchor="middle">Raw streams never reach the LLM</text>
  <line stroke="#e5e7eb" stroke-width="1" x1="504" y1="446" x2="688" y2="446"/>
  <!-- Checklist -->
  <text fill="#059669" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" x="516" y="468">&#x2713; Session-scoped consent</text>
  <text fill="#059669" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" x="516" y="490">&#x2713; Pre-execution cost gate</text>
  <text fill="#059669" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" x="516" y="512">&#x2713; Every call audit-logged</text>
  <text fill="#059669" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" x="516" y="534">&#x2713; Cloud-sync detection</text>
  <text fill="#059669" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" x="516" y="556">&#x2713; Circuit breaker (3 fails)</text>
  <line stroke="#e5e7eb" stroke-width="1" x1="504" y1="568" x2="688" y2="568"/>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="596" y="588" text-anchor="middle">Rules live server-side,</text>
  <text fill="#6b7280" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="10" x="596" y="602" text-anchor="middle">not in LLM prompts.</text>
</svg>
