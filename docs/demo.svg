<svg xmlns="http://www.w3.org/2000/svg" width="820" height="580" viewBox="0 0 820 580">
  <!-- Background -->
  <rect fill="#1e1e2e" x="0" y="0" width="820" height="580" rx="8" ry="8"/>
  <!-- Title bar -->
  <rect fill="#313244" x="0" y="0" width="820" height="36" rx="8" ry="8"/>
  <rect fill="#1e1e2e" x="0" y="28" width="820" height="8"/>
  <circle fill="#f38ba8" cx="20" cy="18" r="6"/>
  <circle fill="#f9e2af" cx="40" cy="18" r="6"/>
  <circle fill="#a6e3a1" cx="60" cy="18" r="6"/>
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="12" text-anchor="middle" x="410" y="22">biosensor-mcp demo</text>

  <!-- Command prompt -->
  <text fill="#cdd6f4" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="13" x="16" y="60"><tspan fill="#a6e3a1">$</tspan> biosensor-mcp demo</text>
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="11" x="16" y="78">Running analytics on synthetic 60-minute run data. No Strava account needed.</text>

  <!-- === LEFT COLUMN: Raw Data === -->
  <rect fill="#302030" stroke="#f38ba8" stroke-width="1.5" x="24" y="100" width="220" height="360" rx="10" ry="10"/>
  <!-- Header -->
  <text fill="#f38ba8" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" x="134" y="120" text-anchor="middle">YOUR RUN DATA</text>
  <line stroke="#45344a" stroke-width="1" x1="40" y1="128" x2="228" y2="128"/>
  <!-- Stats -->
  <text fill="#cdd6f4" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="12" x="44" y="150">3,600 data points</text>
  <text fill="#cdd6f4" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="12" x="44" y="170">8 stream types</text>
  <text fill="#cdd6f4" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="12" x="44" y="190">1 Hz sampling</text>
  <line stroke="#45344a" stroke-width="1" x1="40" y1="202" x2="228" y2="202"/>
  <!-- Stream labels -->
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="44" y="220">heartrate[]</text>
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="44" y="236">velocity[]</text>
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="44" y="252">latlng[]</text>
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="44" y="268">altitude[]</text>
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="44" y="284">grade[]</text>
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="44" y="300">distance[]</text>
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="44" y="316">time[]</text>
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="44" y="332">moving[]</text>
  <line stroke="#45344a" stroke-width="1" x1="40" y1="344" x2="228" y2="344"/>
  <!-- Token count - large -->
  <text fill="#f38ba8" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="22" font-weight="600" x="134" y="376" text-anchor="middle">~200,000</text>
  <text fill="#f38ba8" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="13" x="134" y="396" text-anchor="middle">tokens</text>
  <!-- Token bar (proportional) -->
  <rect fill="#f38ba8" opacity="0.3" x="40" y="410" width="188" height="18" rx="4" ry="4"/>
  <rect fill="#f38ba8" x="40" y="410" width="188" height="18" rx="4" ry="4" opacity="0.7"/>
  <!-- Cost -->
  <text fill="#f38ba8" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="14" font-weight="600" x="134" y="448" text-anchor="middle">$60/month</text>

  <!-- === Arrow 1 === -->
  <line stroke="#6c7086" stroke-width="1.5" x1="252" y1="280" x2="288" y2="280"/>
  <polygon fill="#6c7086" points="288,274 300,280 288,286"/>

  <!-- === CENTER COLUMN: Security Pipeline === -->
  <rect fill="#1a2332" stroke="#89b4fa" stroke-width="1.5" x="304" y="100" width="220" height="360" rx="10" ry="10"/>
  <!-- Header -->
  <text fill="#89b4fa" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" x="414" y="120" text-anchor="middle">SERVER-SIDE PIPELINE</text>
  <line stroke="#2a3a4f" stroke-width="1" x1="320" y1="128" x2="508" y2="128"/>
  <!-- Pipeline steps -->
  <rect fill="#232e3e" x="320" y="140" width="188" height="28" rx="6" ry="6"/>
  <text fill="#cdd6f4" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="11" x="332" y="158">&#x2460; ParamValidator</text>
  <rect fill="#232e3e" x="320" y="176" width="188" height="28" rx="6" ry="6"/>
  <text fill="#cdd6f4" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="11" x="332" y="194">&#x2461; CircuitBreaker</text>
  <rect fill="#232e3e" x="320" y="212" width="188" height="28" rx="6" ry="6"/>
  <text fill="#cdd6f4" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="11" x="332" y="230">&#x2462; ConsentGate</text>
  <rect fill="#232e3e" x="320" y="248" width="188" height="28" rx="6" ry="6"/>
  <text fill="#cdd6f4" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="11" x="332" y="266">&#x2463; CostGate</text>
  <rect fill="#232e3e" x="320" y="284" width="188" height="28" rx="6" ry="6"/>
  <text fill="#cdd6f4" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="11" x="332" y="302">&#x2464; AuditLog + Ledger</text>
  <!-- Divider -->
  <line stroke="#2a3a4f" stroke-width="1" x1="320" y1="324" x2="508" y2="324"/>
  <!-- Analytics -->
  <text fill="#89b4fa" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" x="414" y="344" text-anchor="middle">ANALYTICS</text>
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="332" y="364">zones, splits, drift</text>
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="332" y="380">decoupling, EF, phases</text>
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="332" y="396">GAP, anomaly detection</text>
  <!-- Local badge -->
  <rect fill="#1e3a2e" stroke="#a6e3a1" stroke-width="1" x="338" y="414" width="152" height="28" rx="14" ry="14"/>
  <text fill="#a6e3a1" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" x="414" y="432" text-anchor="middle">&#x1F512; On your machine</text>

  <!-- === Arrow 2 === -->
  <line stroke="#6c7086" stroke-width="1.5" x1="532" y1="280" x2="568" y2="280"/>
  <polygon fill="#6c7086" points="568,274 580,280 568,286"/>

  <!-- === RIGHT COLUMN: What Claude Sees === -->
  <rect fill="#1a2e1a" stroke="#a6e3a1" stroke-width="1.5" x="584" y="196" width="212" height="168" rx="10" ry="10"/>
  <!-- Header -->
  <text fill="#a6e3a1" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" x="690" y="216" text-anchor="middle">WHAT CLAUDE SEES</text>
  <line stroke="#2e4a2e" stroke-width="1" x1="600" y1="224" x2="780" y2="224"/>
  <!-- Summary items -->
  <text fill="#cdd6f4" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="604" y="244">decoupling:  7.8%</text>
  <text fill="#cdd6f4" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="604" y="260">efficiency:  57.82 EF</text>
  <text fill="#cdd6f4" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="604" y="276">hr_drift:    5.3%</text>
  <text fill="#cdd6f4" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="604" y="292">zones:  Z3/Z4/Z5</text>
  <text fill="#cdd6f4" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="10" x="604" y="308">splits: 8:48&#x2192;9:12</text>
  <line stroke="#2e4a2e" stroke-width="1" x1="600" y1="318" x2="780" y2="318"/>
  <!-- Token count - small -->
  <text fill="#a6e3a1" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="18" font-weight="600" x="690" y="342" text-anchor="middle">~800 tokens</text>
  <!-- Token bar (proportional - tiny!) -->
  <rect fill="#a6e3a1" opacity="0.7" x="678" y="350" width="3" height="6" rx="1" ry="1"/>
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="9" x="686" y="356">&#x2190; to scale</text>

  <!-- === Bottom footer === -->
  <line stroke="#45405e" stroke-width="1" x1="24" y1="480" x2="796" y2="480"/>
  <!-- Reduction callout -->
  <text fill="#a6e3a1" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="20" font-weight="600" x="410" y="512" text-anchor="middle">99.6% token reduction</text>
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="12" x="410" y="534" text-anchor="middle">Raw per-second data never leaves your machine  &#xB7;  Same analytical quality  &#xB7;  $0.02/query</text>
  <text fill="#45405e" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="11" x="410" y="556" text-anchor="middle">Try it: pip install -e . &amp;&amp; biosensor-mcp demo</text>
</svg>
