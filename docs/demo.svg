<svg xmlns="http://www.w3.org/2000/svg" width="820" height="580" viewBox="0 0 820 580">
  <!-- Window frame -->
  <rect fill="#1e1e2e" x="0" y="0" width="820" height="580" rx="8" ry="8"/>
  <rect fill="#313244" x="0" y="0" width="820" height="36" rx="8" ry="8"/>
  <rect fill="#1e1e2e" x="0" y="28" width="820" height="8"/>

  <!-- Traffic lights -->
  <circle fill="#f38ba8" cx="20" cy="18" r="6"/>
  <circle fill="#f9e2af" cx="40" cy="18" r="6"/>
  <circle fill="#a6e3a1" cx="60" cy="18" r="6"/>
  <text fill="#6c7086" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="12" text-anchor="middle" x="410" y="22">biosensor-mcp demo</text>

  <!-- Terminal content -->
  <g transform="translate(16, 52)" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-size="13" fill="#cdd6f4">
    <text><tspan fill="#a6e3a1">$</tspan> biosensor-mcp demo</text>
    <text y="44" fill="#f9e2af">Biosensor MCP &#x2014; Demo Mode</text>
    <text y="66" fill="#6c7086">==================================================</text>
    <text y="88">Running analytics on synthetic 60-minute run data.</text>
    <text y="110" fill="#6c7086">No Strava account or OAuth tokens required.</text>
    <text y="154">Generated: <tspan fill="#a6e3a1">3600</tspan> data points, <tspan fill="#a6e3a1">6.65</tspan> miles</text>
    <text y="176">Activity:  <tspan fill="#89b4fa">Demo: Thursday Recovery Run</tspan></text>
    <text y="220" fill="#f9e2af">--- strava_run_report ---</text>
    <text y="242">  <tspan fill="#cba6f7">decoupling</tspan>:    <tspan fill="#a6e3a1">7.8%</tspan> (moderate)</text>
    <text y="264">  <tspan fill="#cba6f7">efficiency</tspan>:    <tspan fill="#a6e3a1">57.82</tspan> EF</text>
    <text y="286">  <tspan fill="#cba6f7">hr_drift</tspan>:      <tspan fill="#a6e3a1">5.3%</tspan> (moderate drift)</text>
    <text y="308">  <tspan fill="#cba6f7">hr_zones</tspan>:      Z3 <tspan fill="#a6e3a1">8.1%</tspan> &#xB7; Z4 <tspan fill="#a6e3a1">90.8%</tspan> &#xB7; Z5 <tspan fill="#a6e3a1">1.1%</tspan></text>
    <text y="330">  <tspan fill="#cba6f7">mile_splits</tspan>:   <tspan fill="#a6e3a1">8:48</tspan> &#x2192; <tspan fill="#a6e3a1">9:12</tspan> (7 miles)</text>
    <text y="352">  <tspan fill="#cba6f7">anomalies</tspan>:     none</text>
    <text y="396" fill="#f9e2af">--- strava_hr_analysis ---</text>
    <text y="418">  avg_hr: <tspan fill="#a6e3a1">156</tspan> bpm &#xB7; max: <tspan fill="#a6e3a1">169</tspan> bpm &#xB7; drift: <tspan fill="#a6e3a1">5.3%</tspan></text>
    <text y="462" fill="#f9e2af">--- strava_pace_analysis ---</text>
    <text y="484">  classification: <tspan fill="#a6e3a1">100%</tspan> running &#xB7; splits: <tspan fill="#a6e3a1">8:48</tspan> &#x2192; <tspan fill="#a6e3a1">9:12</tspan></text>
    <text y="510" fill="#6c7086">==================================================</text>
    <text y="532" fill="#6c7086" font-style="italic">Demo complete. All analytics computed server-side from synthetic data.</text>
  </g>
</svg>
